<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <!-- Basic Favicon/Icons -->
    <link rel="icon" href="/icons/icon16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="/icons/icon32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/icons/icon192.png" sizes="192x192" type="image/png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Basic Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="description" content="Check real-time weather for NFL and NCAA football stadiums." />
    <title>Stadium Weather</title>

    <!-- Your Tailwind + Custom CSS -->
  <script type="module" crossorigin src="/assets/app.CcH-NRoh.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/app.DxWKg2OU.css">
</head>

<body class="bg-white dark:bg-gray-900 text-black dark:text-white min-h-screen flex flex-col justify-center">
    <!-- Main Container -->
    <div id="root"
        class="container mx-auto max-w-xl p-4 md:p-6 shadow-sm rounded-lg bg-neutral-light dark:bg-neutral-dark">
        <!-- Header / Title Bar -->
        <header class="header mb-4 rounded text-center">
            <h1 class="text-xl sm:text-2xl font-bold">
                Stadium Weather
            </h1>
        </header>

        <!-- Controls Row -->
        <div class="controls flex items-center gap-3 mb-4 justify-center">
            <input type="date" id="weather-date"
                class="border rounded px-2 py-1 text-sm focus:outline-none focus:ring" />
            <button id="refresh" class="primary-button px-4 py-2 rounded shadow hover:shadow-md text-sm">
                Refresh
            </button>
            <button id="settings" class="primary-button px-4 py-2 rounded shadow hover:shadow-md text-sm">
                Settings
            </button>
        </div>

        <!-- Stadium Select -->
        <div class="team-dropdown mb-4">
            <select id="stadiumSelect" class="w-full text-sm">
                <!-- Populated dynamically in index.ts -->
            </select>
        </div>

        <!-- Weather List -->
        <div id="weatherList" class="w-full flex flex-col gap-4"></div>
    </div>

    <!-- Main Script -->
</body>

</html>
